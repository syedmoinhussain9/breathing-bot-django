{% extends 'base.html' %}
{% load static %}
{% load i18n %}

{% block content %}
    <div class="container py-4 text-center" style="max-width: 480px;">

        <h2 class="fw-bold mb-1">{% trans "Coherent Breathing" %}</h2>
        <p class="text-muted small mb-4">{% trans "6 seconds in, 6 seconds out. Calms the nervous system." %}</p>

        <div id="breathing-app-container"
             data-lang="{{ LANGUAGE_CODE }}"
             data-audio-base="{% static 'audio/tts' %}"
             data-txt-inhale="{% trans 'Inhale' %}"
             data-txt-exhale="{% trans 'Exhale' %}"
             data-txt-ended="{% trans 'Session has ended' %}">

            <div class="card border-0 shadow-sm p-4 mb-4">
                <div style="width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <div id="breathing-ring" class="rounded-circle"
                         style="width: 100px; height: 100px; background: #0d6efd; opacity: 0.85;"></div>
                </div>
                <h3 id="pacing-state-label" class="fw-semibold text-muted mb-1">{% trans "Ready" %}</h3>
                <h1 id="countdown-number" class="display-2 fw-bold mb-0">00</h1>
            </div>

            <div class="d-flex justify-content-center gap-3">
                <button id="action-trigger-btn" class="btn btn-lg btn-success px-5 fw-semibold">
                    {% trans "Start" %}
                </button>
                <button id="stop-trigger-btn" class="btn btn-lg btn-danger px-5 fw-semibold d-none">
                    {% trans "Stop" %}
                </button>
            </div>

        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script src="{% static 'js/panicroom.js' %}?v=2"></script>
{% endblock %}
