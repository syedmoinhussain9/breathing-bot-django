{% extends 'base.html' %}
{% load static %}
{% load i18n %}

{% block content %}
    <div id="breathing-app-container" class="container py-4"
         data-lang="{{ request.LANGUAGE_CODE|default:'en' }}"
         data-audio-base="{% static 'audio/tts' %}"
         data-txt-inhale="{{ txt_inhale }}"
         data-txt-hold="{{ txt_hold }}"
         data-txt-exhale="{{ txt_exhale }}"
         data-txt-rest="{{ txt_rest }}"
         data-txt-ended="{{ txt_ended }}">

        <div class="row g-4">
            <div class="col-12 col-lg-5">
                <div class="card shadow-sm h-100">
                    <div class="card-body p-4">
                        <h3 class="card-title h4 mb-1 text-dark fw-bold">{% trans "Configure Exercise" %}</h3>
                        <form id="breathing-config-form">
                            <div class="mb-3">
                                <label for="technique-select" class="form-label fw-semibold text-secondary small">{% trans "Breathing Technique" %}</label>
                                <select id="technique-select" class="form-select">
                                    {% for key, value in presets.items %}
                                        <option value="{{ key }}" data-description="{{ value.description }}">{{ value.name }}</option>
                                    {% endfor %}
                                    <option value="custom">⚙️ {% trans "Custom Manual Rhythm..." %}</option>
                                </select>
                            </div>

                            <div id="technique-description-box" class="alert alert-info py-2 px-3 small mb-3 shadow-none"></div>

                            <div id="level-selection-group" class="mb-3">
                                <label class="form-label fw-semibold text-secondary small d-block">{% trans "Intensity Level" %}</label>
                                <div class="btn-group w-100" role="group">
                                    <button type="button" class="btn btn-outline-primary active" data-level="1">1</button>
                                    <button type="button" class="btn btn-outline-primary" data-level="2">2</button>
                                    <button type="button" class="btn btn-outline-primary" data-level="3">3</button>
                                    <button type="button" class="btn btn-outline-primary" data-level="4">4</button>
                                    <button type="button" class="btn btn-outline-primary" data-level="5">5</button>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="cycles-input" class="form-label fw-semibold text-secondary small">{% trans "Target Exercise Cycles" %}</label>
                                <input type="number" id="cycles-input" class="form-control" min="1" max="100" value="10">
                            </div>

                            <div id="custom-sliders-block" class="p-3 bg-light rounded border mb-4 d-none">
                            </div>

                            <button type="submit" id="action-trigger-btn" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                                🚀 {% trans "Initialize Breathing Tracker" %}
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-7">
                <div class="card shadow-sm h-100 bg-dark text-light border-0">
                    <div class="card-body p-5 d-flex flex-column align-items-center justify-content-center text-center">
                        <div id="pacing-state-label" class="text-uppercase text-info fw-bold mb-2">{% trans "Ready to Begin" %}</div>
                        <div id="countdown-number" class="display-1 fw-bold text-white my-3">00</div>
                        <div class="my-4" style="width: 240px; height: 240px; display: flex; align-items: center; justify-content: center;">
                            <div id="breathing-ring" class="rounded-circle border border-4 border-info" style="width: 100px; height: 100px; transition: all 1s linear;"></div>
                        </div>
                        <div class="fs-5 text-secondary">
                            {% trans "Cycle" %}: <span id="current-cycle-count" class="text-white">0</span> / <span id="target-cycle-total">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {{ presets|json_script:"django-presets-data" }}
{% endblock %}

{% block extra_js %}
    <script src="{% static 'js/timer.js' %}?v=2"></script>
{% endblock %}
