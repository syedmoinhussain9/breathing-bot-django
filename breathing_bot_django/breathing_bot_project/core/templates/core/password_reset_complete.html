{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container py-5 text-center" style="max-width: 480px;">
    <div class="card border-0 shadow-sm p-5">
        <div style="font-size: 3rem;">✅</div>
        <h3 class="mt-3">{% trans "Password updated" %}</h3>
        <p class="text-muted">{% trans "Your password has been set. You can now log in with your new password." %}</p>
        <a href="{% url 'core:dashboard' %}" class="btn btn-outline-primary mt-2">{% trans "Back to login" %}</a>
    </div>
</div>
{% endblock %}
