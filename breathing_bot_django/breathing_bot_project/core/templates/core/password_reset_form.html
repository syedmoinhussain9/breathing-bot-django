{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container py-5" style="max-width: 480px;">

    <h2 class="text-center mb-1">{% trans "Reset Password" %}</h2>
    <p class="text-center text-muted small mb-4">{% trans "Enter your email and we'll send you a reset link." %}</p>

    <div class="card border-0 shadow-sm p-4">
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-semibold">{% trans "Email address" %}</label>
                <input type="email" name="email" class="form-control" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100">{% trans "Send Reset Link" %}</button>
        </form>
    </div>

    <p class="text-center text-muted small mt-3">
        <a href="{% url 'core:dashboard' %}">{% trans "Back to login" %}</a>
    </p>
</div>
{% endblock %}
