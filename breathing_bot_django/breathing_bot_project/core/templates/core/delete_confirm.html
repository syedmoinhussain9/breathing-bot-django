{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container py-5" style="max-width: 500px;">
    <div class="card border-0 shadow-sm p-4 text-center">
        <h4 class="text-danger">{% trans "Delete Account" %}</h4>
        <p>{% trans "Are you sure you want to delete your account? This action is permanent and cannot be undone." %}</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-danger">{% trans "Yes, Delete My Account" %}</button>
                <a href="{% url 'core:profile_history' %}" class="btn btn-outline-secondary">{% trans "Cancel" %}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
